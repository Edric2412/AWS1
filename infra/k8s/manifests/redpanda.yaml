apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
          command:
            - /bin/sh
            - -c
            - |
              exec rpk redpanda start \
                --overprovisioned \
                --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092 \
                --advertise-kafka-addr internal://localhost:9092,external://redpanda-service:29092
          ports:
            - containerPort: 29092
              name: plaintext
            - containerPort: 9092
              name: outside
            - containerPort: 8082
              name: proxy
          volumeMounts:
            - mountPath: /var/lib/redpanda/data
              name: redpanda-storage
      volumes:
        - name: redpanda-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-service
spec:
  type: LoadBalancer
  ports:
    - port: 29092
      targetPort: 29092
      name: plaintext
    - port: 9092
      targetPort: 9092
      name: outside
    - port: 8082
      targetPort: 8082
      name: proxy
  selector:
    app: redpanda
