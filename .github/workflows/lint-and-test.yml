name: Lint and Test Gateway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      # We will spin up mock test containers in docker-compose, but we declare them here for Github Actions
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: syncops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redpanda:
        image: docker.redpanda.com/redpandadata/redpanda:v23.3.1
        command: >-
          redpanda start
          --smp 1
          --overprovisioned
          --kafka-addr PLAINTEXT://0.0.0.0:9092
          --advertise-kafka-addr PLAINTEXT://localhost:9092
        ports:
          - 9092:9092

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.11'
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-mock pytest-asyncio httpx pydantic pydantic-settings python-dotenv
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check --format=github backend/

    - name: Run Pytest
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        VLLM_API_URL: http://localhost:8000/v1
        OLLAMA_API_URL: http://localhost:11434
        OLLAMA_MODEL: qwen3.5:1.5b
        VLLM_MODEL: Qwen/Qwen3.5-8B-Instruct
      run: |
        python -m pytest backend/tests/
